name: Scrape Walmart & Target Deals
on:
  schedule:
    - cron: '30 */3 * * *'   # Every 3 hours at :30 (offset from Hostinger cron at :00)
  workflow_dispatch:          # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Scrape deals and push to site
        run: |
          # ── Walmart deals via HTML scraping ──────────────────────────────
          echo "=== Scraping Walmart ==="
          DEALS='[]'

          for URL in \
            "https://www.walmart.com/shop/deals/flash-deals" \
            "https://www.walmart.com/browse/rollback?cat_id=0&facet=special_offers%3ARollback" \
            "https://www.walmart.com/browse/electronics?facet=special_offers%3ARollback"; do

            echo "Fetching: $URL"
            HTML=$(curl -sL --max-time 20 \
              -H 'Accept: text/html,application/xhtml+xml' \
              -H 'Accept-Language: en-US,en;q=0.9' \
              -H 'User-Agent: Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/125.0.0.0 Safari/537.36' \
              "$URL" 2>/dev/null || echo "")

            BYTES=${#HTML}
            echo "  Got $BYTES bytes"

            # Check for __NEXT_DATA__
            if echo "$HTML" | grep -q '__NEXT_DATA__'; then
              echo "  Found __NEXT_DATA__!"
              # Extract __NEXT_DATA__ JSON and process with Python
              NEXT_DATA=$(echo "$HTML" | python3 -c "
          import sys, json, re
          html = sys.stdin.read()
          m = re.search(r'<script id=\"__NEXT_DATA__\"[^>]*>(.*?)</script>', html, re.DOTALL)
          if m:
              data = json.loads(m.group(1))
              items = []
              # Try multiple paths for product data
              for path in [
                  lambda d: d.get('props',{}).get('pageProps',{}).get('initialData',{}).get('searchResult',{}).get('itemStacks',[]),
              ]:
                  stacks = path(data)
                  for stack in (stacks if isinstance(stacks, list) else []):
                      for item in stack.get('items', []):
                          name = item.get('name','')
                          price = float(item.get('price', 0) or 0)
                          pi = item.get('priceInfo', {})
                          was_raw = pi.get('wasPrice','')
                          was = float(re.sub(r'[^\d.]','', str(was_raw)) or 0)
                          savings = float(pi.get('savingsAmt', 0) or 0)
                          if was <= 0 and price > 0 and savings > 0:
                              was = round(price + savings, 2)
                          pct = round((was - price) / was * 100) if was > price > 0 else 0
                          if pct >= 50 and name:
                              img_info = item.get('imageInfo', {})
                              img = img_info.get('thumbnailUrl') or img_info.get('url','') if isinstance(img_info, dict) else ''
                              item_id = item.get('usItemId','')
                              items.append({
                                  'title': name[:500],
                                  'original_price': was,
                                  'sale_price': price,
                                  'discount_pct': pct,
                                  'image_url': img or None,
                                  'product_url': f'https://www.walmart.com/ip/{item_id}',
                                  'affiliate_url': f'https://www.walmart.com/ip/{item_id}',
                                  'store': 'walmart',
                                  'category': None,
                              })
              print(json.dumps(items))
          else:
              print('[]')
          " 2>/dev/null || echo "[]")

              COUNT=$(echo "$NEXT_DATA" | python3 -c "import sys,json; print(len(json.loads(sys.stdin.read())))" 2>/dev/null || echo 0)
              echo "  Extracted $COUNT Walmart deals"

              # Merge into DEALS array
              DEALS=$(python3 -c "
          import json,sys
          a = json.loads('$DEALS')
          b = json.loads(sys.stdin.read())
          a.extend(b)
          print(json.dumps(a))
          " <<< "$NEXT_DATA" 2>/dev/null || echo "$DEALS")
            else
              echo "  No __NEXT_DATA__ found"
            fi
            sleep 3
          done

          TOTAL=$(echo "$DEALS" | python3 -c "import sys,json; print(len(json.loads(sys.stdin.read())))" 2>/dev/null || echo 0)
          echo "Total deals to submit: $TOTAL"

          if [ "$TOTAL" -gt 0 ]; then
            echo "Submitting to 50offsale.com..."
            PAYLOAD=$(python3 -c "import json,sys; print(json.dumps({'deals': json.loads(sys.stdin.read())}))" <<< "$DEALS")
            RESULT=$(curl -sL --max-time 30 \
              -X POST \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${{ secrets.SUBMIT_DEALS_SECRET }}" \
              -d "$PAYLOAD" \
              "https://50offsale.com/api/submit-deals.php" 2>/dev/null || echo '{"error":"request failed"}')
            echo "Result: $RESULT"
          else
            echo "No deals found — skipping submission"
          fi
