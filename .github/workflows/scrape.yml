              -d "$JSON" "https://50offsale.com/api/ingest.php"
          fi

      - name: Scrape Best Buy
        run: |
          echo "=== Best Buy ==="
          JSON=$(SCRAPER_OUTPUT=json php scraper/run.php bestbuy)
          COUNT=$(echo "$JSON" | python3 -c "import sys,json; print(len(json.loads(sys.stdin.read())))" 2>/dev/null || echo 0)
          echo "Scraped: $COUNT"
          if [ "$COUNT" -gt 0 ]; then
            curl -sL --max-time 30 -X POST \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${{ secrets.INGEST_TOKEN }}" \
              -d "$JSON" "https://50offsale.com/api/ingest.php"
          fi

      - name: Scrape 6pm
        run: |
          echo "=== 6pm ==="
          JSON=$(SCRAPER_OUTPUT=json php scraper/run.php 6pm)
          COUNT=$(echo "$JSON" | python3 -c "import sys,json; print(len(json.loads(sys.stdin.read())))" 2>/dev/null || echo 0)
          echo "Scraped: $COUNT"
          if [ "$COUNT" -gt 0 ]; then
            curl -sL --max-time 30 -X POST \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${{ secrets.INGEST_TOKEN }}" \
              -d "$JSON" "https://50offsale.com/api/ingest.php"
          fi
