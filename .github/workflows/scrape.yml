name: Scrape Target Deals
on:
  schedule:
    - cron: '30 */3 * * *'   # Every 3 hours at :30 (offset from Hostinger cron at :00)
  workflow_dispatch:          # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: curl, json, mbstring

      - name: Scrape Target and push to site
        run: |
          echo "=== Scraping Target (RedSky API) ==="

          # stdout = clean JSON array, stderr = progress logs
          JSON=$(SCRAPER_OUTPUT=json php scraper/run.php target)
          EXIT=$?

          COUNT=$(echo "$JSON" | python3 -c "import sys,json; print(len(json.loads(sys.stdin.read())))" 2>/dev/null || echo 0)
          echo "Deals scraped: $COUNT (exit: $EXIT)"

          if [ "$COUNT" -gt 0 ]; then
            echo "Submitting to 50offsale.com..."
            PAYLOAD=$(python3 -c "import json,sys; print(json.dumps({'deals': json.loads(sys.stdin.read())}))" <<< "$JSON")
            RESULT=$(curl -sL --max-time 30 \
              -X POST \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${{ secrets.SUBMIT_DEALS_SECRET }}" \
              -d "$PAYLOAD" \
              "https://50offsale.com/api/submit-deals.php" 2>/dev/null || echo '{"error":"request failed"}')
            echo "Result: $RESULT"
          else
            echo "No deals found — skipping submission"
          fi
