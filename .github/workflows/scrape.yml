name: Scrape Deals (Amazon + Target)
on:
  schedule:
    - cron: '30 */3 * * *'   # Every 3 hours at :30 (offset from Hostinger cron at :00)
  workflow_dispatch:          # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: curl, json, mbstring

      - name: Scrape Amazon and push to site
        run: |
          echo "=== Scraping Amazon ==="
          JSON=$(SCRAPER_OUTPUT=json php scraper/run.php amazon)
          EXIT=$?

          COUNT=$(echo "$JSON" | python3 -c "import sys,json; print(len(json.loads(sys.stdin.read())))" 2>/dev/null || echo 0)
          echo "Amazon deals scraped: $COUNT (exit: $EXIT)"

          if [ "$COUNT" -gt 0 ]; then
            echo "Submitting Amazon deals to 50offsale.com..."
            RESULT=$(curl -sL --max-time 30 \
              -X POST \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${{ secrets.INGEST_TOKEN }}" \
              -d "$JSON" \
              "https://50offsale.com/api/ingest.php" 2>/dev/null || echo '{"error":"request failed"}')
            echo "Result: $RESULT"
          else
            echo "No Amazon deals found — skipping submission"
          fi

      - name: Scrape Target and push to site
        run: |
          echo "=== Scraping Target (RedSky API) ==="
          JSON=$(SCRAPER_OUTPUT=json php scraper/run.php target)
          EXIT=$?

          COUNT=$(echo "$JSON" | python3 -c "import sys,json; print(len(json.loads(sys.stdin.read())))" 2>/dev/null || echo 0)
          echo "Target deals scraped: $COUNT (exit: $EXIT)"

          if [ "$COUNT" -gt 0 ]; then
            echo "Submitting Target deals to 50offsale.com..."
            RESULT=$(curl -sL --max-time 30 \
              -X POST \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${{ secrets.INGEST_TOKEN }}" \
              -d "$JSON" \
              "https://50offsale.com/api/ingest.php" 2>/dev/null || echo '{"error":"request failed"}')
            echo "Result: $RESULT"
          else
            echo "No Target deals found — skipping submission"
          fi

      - name: Scrape eBay and push to site
        run: |
          echo "=== Scraping eBay Deals ==="
          JSON=$(SCRAPER_OUTPUT=json php scraper/run.php ebay)
          EXIT=$?

          COUNT=$(echo "$JSON" | python3 -c "import sys,json; print(len(json.loads(sys.stdin.read())))" 2>/dev/null || echo 0)
          echo "eBay deals scraped: $COUNT (exit: $EXIT)"

          if [ "$COUNT" -gt 0 ]; then
            echo "Submitting eBay deals to 50offsale.com..."
            RESULT=$(curl -sL --max-time 30 \
              -X POST \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${{ secrets.INGEST_TOKEN }}" \
              -d "$JSON" \
              "https://50offsale.com/api/ingest.php" 2>/dev/null || echo '{"error":"request failed"}')
            echo "Result: $RESULT"
          else
            echo "No eBay deals found — skipping submission"
          fi
