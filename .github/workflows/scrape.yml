name: Scrape Deals (All Retailers)
on:
  schedule:
    - cron: '30 */3 * * *'   # Every 3 hours at :30 (offset from Hostinger cron at :00)
  workflow_dispatch:          # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: curl, json, mbstring

      - name: Scrape Amazon
        run: |
          echo "=== Amazon ==="
          JSON=$(SCRAPER_OUTPUT=json php scraper/run.php amazon)
          COUNT=$(echo "$JSON" | python3 -c "import sys,json; print(len(json.loads(sys.stdin.read())))" 2>/dev/null || echo 0)
          echo "Scraped: $COUNT"
          if [ "$COUNT" -gt 0 ]; then
            curl -sL --max-time 30 -X POST \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${{ secrets.INGEST_TOKEN }}" \
              -d "$JSON" "https://50offsale.com/api/ingest.php"
          fi

      - name: Scrape Target
        run: |
          echo "=== Target ==="
          JSON=$(SCRAPER_OUTPUT=json php scraper/run.php target)
          COUNT=$(echo "$JSON" | python3 -c "import sys,json; print(len(json.loads(sys.stdin.read())))" 2>/dev/null || echo 0)
          echo "Scraped: $COUNT"
          if [ "$COUNT" -gt 0 ]; then
            curl -sL --max-time 30 -X POST \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${{ secrets.INGEST_TOKEN }}" \
              -d "$JSON" "https://50offsale.com/api/ingest.php"
          fi

      - name: Scrape eBay
        run: |
          echo "=== eBay ==="
          JSON=$(SCRAPER_OUTPUT=json php scraper/run.php ebay)
          COUNT=$(echo "$JSON" | python3 -c "import sys,json; print(len(json.loads(sys.stdin.read())))" 2>/dev/null || echo 0)
          echo "Scraped: $COUNT"
          if [ "$COUNT" -gt 0 ]; then
            curl -sL --max-time 30 -X POST \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${{ secrets.INGEST_TOKEN }}" \
              -d "$JSON" "https://50offsale.com/api/ingest.php"
          fi

      - name: Scrape Walmart
        run: |
          echo "=== Walmart ==="
          JSON=$(SCRAPER_OUTPUT=json php scraper/run.php walmart)
          COUNT=$(echo "$JSON" | python3 -c "import sys,json; print(len(json.loads(sys.stdin.read())))" 2>/dev/null || echo 0)
          echo "Scraped: $COUNT"
          if [ "$COUNT" -gt 0 ]; then
            curl -sL --max-time 30 -X POST \
              -H "Content-Type: application/json" \
